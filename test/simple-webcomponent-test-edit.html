<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>WebComponent JSON test</title>

		<script type="module" src="../dist/scribe.js"></script>
		<link rel="stylesheet" href="../dist/scribe.css" />
	</head>
	<body>
		<h1>Scribe with JSON test</h1>

		<scribe-interpreter id="scribe" mode="edit" />
	</body>
</html>

<script type="module">
	import data from './simple-test.json' with { type: 'json' };

	const scribeElement = document.getElementById('scribe');
	if (scribeElement) {
		scribeElement.document = data;

		scribeElement.addEventListener('documentchange', (event) => {
			console.log('Document modified:', event.detail);
		});
	}
</script>
