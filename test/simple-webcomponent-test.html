<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>WebComponent test</title>

		<script type="module" src="../dist/scribe.js"></script>
		<link rel="stylesheet" href="../dist/scribe.css" />
	</head>
	<body>
		<h1>Scribe HTML test</h1>

		<scribe-interpreter id="scribe"></scribe-interpreter>
	</body>
</html>

<script>
	const basicExampleDocument = {
		title: 'Basic Example Document',
		sections: {
			'section-1': {
				title: 'Introduction',
				type: 'paragraph-section',
				content: {
					'text-1': {
						id: 'text-1',
						mode: 'inline',
						type: 'text',
						value: {
							type: 'string',
							value:
								'This is a basic example document to demonstrate the structure of a Document with Sections and Components.'
						}
					},
					'input-1': {
						id: 'input-1',
						mode: 'inline',
						type: 'text-input',
						value: {
							type: 'binding',
							id: 'image-url'
						},
						config: {
							placeholder: 'Image URL'
						}
					}
				}
			},
			'section-2': {
				title: 'Image section',
				type: 'paragraph-section',
				content: {
					'image': {
						id: 'image',
						mode: 'inline',
						type: 'image',
						value: {
							type: 'binding',
							id: 'image-url'
						}
					}
				}
			}
		},
		bindings: {
			'image-url': { type: 'string', initialValue: '' }
		}
	};

	document.addEventListener('DOMContentLoaded', () => {
		const scribeElement = document.getElementById('scribe');

		if (scribeElement) {
			scribeElement.document = basicExampleDocument;
		}
	});
</script>
