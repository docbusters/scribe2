<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>WebComponent Styles test</title>

		<script type="module" src="../dist/scribe.js"></script>
		<link rel="stylesheet" href="../dist/scribe.css" />
	</head>
	<body>
		<h1>Scribe with Styles test</h1>

		<div id="container"></div>
	</body>
</html>

<script type="module">
	import data from './simple-test.json' with { type: 'json' };
	import bindings from './simple-test-bindings.json' with { type: 'json' };

	const scribeElement = document.createElement('scribe-interpreter');
	scribeElement.id = 'scribe';
	scribeElement.mode = 'view';
	scribeElement.document = data;
	scribeElement.bindings = bindings;

	scribeElement.addEventListener('documentchange', (event) => {
		console.log('Document modified:', event.detail);
	});

	document.getElementById('container').appendChild(scribeElement);
</script>

<style>
	:root {
		--scribe-doc-background: #086a22;
		--scribe-doc-foreground: #f0f0f0;
		--scribe-font-heading: 'courier new', sans-serif;
	}
</style>
